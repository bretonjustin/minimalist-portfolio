<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tram Status</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #111;
      color: white;
      text-align: center;
    }
    h1 { font-size: 3rem; margin-bottom: 2rem; }
    .status { font-size: 8rem; font-weight: bold; }
    .status.yes { color: #31d158; }
    .status.no  { color: #ff3b30; }
    .status.unknown { color: #ffd60a; }
    .sub { margin-top: 1rem; font-size: 1rem; color: #aaa; max-width: 900px; padding: 0 1rem; }
    .tiny { margin-top: 0.5rem; font-size: 0.9rem; color: #777; }
  </style>
</head>
<body>
  <h1>Is the tram running?</h1>
  <div id="status" class="status unknown">…</div>
  <div id="sub" class="sub">Loading live status…</div>
  <div id="tiny" class="tiny"></div>

<script>
(() => {
  // TODO: replace with your deployed Cloudflare Worker URL
  const WORKER_URL = "https://tram-status.breton-justin97.workers.dev/";
  const REFRESH_MS = 5 * 60 * 1000;

  const statusEl = document.getElementById("status");
  const subEl    = document.getElementById("sub");
  const tinyEl   = document.getElementById("tiny");

  function setStatus(state, details) {
    statusEl.classList.remove("yes", "no", "unknown");
    statusEl.classList.add(state);
    statusEl.textContent = state === "yes" ? "YES" : state === "no" ? "NO" : "UNKNOWN";
    subEl.textContent = details || "";
  }

  async function refresh() {
    setStatus("unknown", "Loading live status…");
    tinyEl.textContent = "";

    try {
      const res = await fetch(WORKER_URL, { cache: "no-store" });
      if (!res.ok) throw new Error(`Worker HTTP ${res.status}`);
      const data = await res.json();

      if (data.running === true)       setStatus("yes", `${data.statusText || "Open"}${data.hoursText ? " • " + data.hoursText : ""}`);
      else if (data.running === false) setStatus("no",  `${data.statusText || "Closed"}${data.hoursText ? " • " + data.hoursText : ""}`);
      else                             setStatus("unknown", data.error || data.statusText || "Unknown");

      tinyEl.textContent = `Retrieved: ${data.fetchedAt || new Date().toISOString()}`;
    } catch (e) {
      setStatus("unknown", "Failed to load status.");
      tinyEl.textContent = e?.message ?? String(e);
    }
  }

  refresh();
  setInterval(refresh, REFRESH_MS);
})();
</script>
</body>
</html>
