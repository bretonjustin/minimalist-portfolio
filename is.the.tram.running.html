<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tram Status</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #111;
      color: white;
      text-align: center;
    }
    h1 { font-size: 3rem; margin-bottom: 2rem; }
    .status { font-size: 8rem; font-weight: bold; }
    .status.open { color: #31d158; }
    .status.closed { color: #ff3b30; }
    .status.hold { color: #ffd60a; }
    .status.unknown { color: #9aa0a6; }
    .sub { margin-top: 1rem; font-size: 1rem; color: #aaa; max-width: 900px; padding: 0 1rem; }
    .tiny { margin-top: 0.5rem; font-size: 0.9rem; color: #777; }
  </style>
</head>
<body>
  <h1>Is the tram running?</h1>
  <div id="status" class="status unknown">…</div>
  <div id="sub" class="sub">Loading live status…</div>
  <div id="tiny" class="tiny"></div>

<script>
(() => {
  const WORKER_URL = "https://tram-status.breton-justin97.workers.dev/";
  const REFRESH_MS = 5 * 60 * 1000;

  const statusEl = document.getElementById("status");
  const subEl    = document.getElementById("sub");
  const tinyEl   = document.getElementById("tiny");

  function setDisplay(state, detail) {
    statusEl.classList.remove("open", "closed", "hold", "unknown");
    statusEl.classList.add(state);

    statusEl.textContent =
      state === "open" ? "YES" :
      state === "closed" ? "NO" :
      state === "hold" ? "HOLD" : "UNKNOWN";

    subEl.textContent = detail || "";
  }

  async function refresh() {
    setDisplay("unknown", "Loading live status…");
    tinyEl.textContent = "";

    try {
      const res = await fetch(WORKER_URL, { cache: "no-store" });
      if (!res.ok) throw new Error(`Worker HTTP ${res.status}`);
      const data = await res.json();

      const state = data.state || "unknown";
      const statuses = Array.isArray(data.statuses) ? data.statuses : (data.statusText ? [data.statusText] : []);
      const detail = [
        statuses.length ? statuses.join(" / ") : null,
        data.hoursText || null
      ].filter(Boolean).join(" • ");

      setDisplay(state, detail || data.error || "Unknown");
      tinyEl.textContent = `Retrieved: ${data.fetchedAt || new Date().toISOString()}`;
    } catch (e) {
      setDisplay("unknown", "Failed to load status.");
      tinyEl.textContent = e?.message ?? String(e);
    }
  }

  refresh();
  setInterval(refresh, REFRESH_MS);
})();
</script>
</body>
</html>
